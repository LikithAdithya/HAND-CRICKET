<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Cricket Game</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --success: #16a34a;
            --danger: #dc2626;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 2rem;
        }

        .status-badge {
            display: inline-block;
            background-color: #e2e8f0;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .score-box {
            background-color: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
        }

        .score-box h3 {
            margin: 0 0 5px 0;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
        }

        .score-val {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text);
        }

        .target-box {
            grid-column: span 2;
            background-color: #fef3c7;
            color: #92400e;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
        }

        .playground {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
        }

        .moves-display {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 1.1rem;
        }

        .move-label {
            font-weight: 600;
        }

        .commentary {
            font-style: italic;
            color: #64748b;
            font-size: 1rem;
            margin-top: 5px;
        }

        .controls-title {
            font-weight: 600;
            margin-bottom: 15px;
            color: #475569;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .num-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .num-btn:hover {
            background-color: var(--secondary);
        }

        .num-btn:active {
            transform: scale(0.95);
        }

        .btn-action {
            width: 100%;
            background-color: var(--success);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            display: none;
        }

        .btn-action:hover {
            filter: brightness(0.9);
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Hand Cricket</h1>
    <div id="statusBadge" class="status-badge">Innings 1: You are Batting</div>

    <div class="scoreboard">
        <div class="score-box">
            <h3>Your Score</h3>
            <div id="playerScore" class="score-val">0</div>
        </div>
        <div class="score-box">
            <h3>Comp Score</h3>
            <div id="compScore" class="score-val">0</div>
        </div>
        <div id="targetBox" class="target-box" style="display: none;">
            Target to win: <span id="targetVal">0</span>
        </div>
    </div>

    <div class="playground">
        <div id="movesDisplay" class="moves-display" style="display: none;">
            <div>You: <span id="playerMove" class="move-label">-</span></div>
            <div>Comp: <span id="compMove" class="move-label">-</span></div>
        </div>
        <div id="commentary" class="commentary">Choose a number below to start match!</div>
    </div>

    <div id="controlsSection">
        <div class="controls-title">Choose your run/delivery:</div>
        <div class="button-grid">
            <button class="num-btn" onclick="playTurn(1)">1</button>
            <button class="num-btn" onclick="playTurn(2)">2</button>
            <button class="num-btn" onclick="playTurn(3)">3</button>
            <button class="num-btn" onclick="playTurn(4)">4</button>
            <button class="num-btn" onclick="playTurn(5)">5</button>
            <button class="num-btn" onclick="playTurn(6)">6</button>
        </div>
    </div>

    <button id="actionBtn" class="btn-action" onclick="resetGame()">Play Again</button>
</div>

<script>
    // Game state variables
    let currentInnings = 1;
    let playerScore = 0;
    let compScore = 0;
    let targetScore = null;
    let isGameOver = false;

    // DOM Elements
    const statusBadge = document.getElementById('statusBadge');
    const pScoreEl = document.getElementById('playerScore');
    const cScoreEl = document.getElementById('compScore');
    const targetBox = document.getElementById('targetBox');
    const targetVal = document.getElementById('targetVal');
    const movesDisplay = document.getElementById('movesDisplay');
    const playerMoveEl = document.getElementById('playerMove');
    const compMoveEl = document.getElementById('compMove');
    const commentaryEl = document.getElementById('commentary');
    const controlsSection = document.getElementById('controlsSection');
    const actionBtn = document.getElementById('actionBtn');

    function playTurn(playerChoice) {
        if (isGameOver) return;

        // Generate computer choice (1 to 6)
        const compChoice = Math.floor(Math.random() * 6) + 1;

        // Display the current choices
        movesDisplay.style.display = 'flex';
        playerMoveEl.textContent = playerChoice;
        compMoveEl.textContent = compChoice;

        if (currentInnings === 1) {
            // --- INNINGS 1: PLAYER BATTING ---
            if (playerChoice === compChoice) {
                // Player is out
                targetScore = playerScore + 1;
                commentaryEl.textContent = `OUT! You both chose ${playerChoice}. Your final score is ${playerScore}.`;
                
                // Set up Innings 2
                currentInnings = 2;
                statusBadge.textContent = "Innings 2: You are Bowling";
                statusBadge.style.backgroundColor = "#fee2e2";
                statusBadge.style.color = "#991b1b";
                
                targetVal.textContent = targetScore;
                targetBox.style.display = 'block';
            } else {
                // Add choice to player's score
                playerScore += playerChoice;
                pScoreEl.textContent = playerScore;
                commentaryEl.textContent = `Nice shot! You scored ${playerChoice} runs.`;
            }
        } else {
            // --- INNINGS 2: COMPUTER BATTING ---
            if (playerChoice === compChoice) {
                // Computer is out
                commentaryEl.textContent = `OUT! You got the computer out!`;
                endGame();
            } else {
                // Add choice to computer's score
                compScore += compChoice;
                cScoreEl.textContent = compScore;
                commentaryEl.textContent = `Computer scores ${compChoice} runs.`;

                // Check if computer chased down the target
                if (compScore >= targetScore) {
                    endGame();
                }
            }
        }
    }

    function endGame() {
        isGameOver = true;
        controlsSection.style.display = 'none';
        actionBtn.style.display = 'block';

        if (playerScore > compScore) {
            statusBadge.textContent = "GAME OVER: YOU WIN! 🏆";
            statusBadge.style.backgroundColor = "#dcfce7";
            statusBadge.style.color = "#166534";
            commentaryEl.textContent = `Congratulations! You defended your score by ${playerScore - compScore} runs!`;
        } else if (compScore > playerScore) {
            statusBadge.textContent = "GAME OVER: COMPUTER WINS! 🤖";
            statusBadge.style.backgroundColor = "#fee2e2";
            statusBadge.style.color = "#991b1b";
            commentaryEl.textContent = `The computer chased down your target score easily. Better luck next time!`;
        } else {
            statusBadge.textContent = "GAME OVER: IT'S A TIE! 🤝";
            statusBadge.style.backgroundColor = "#fef3c7";
            statusBadge.style.color = "#92400e";
            commentaryEl.textContent = `Unbelievable! Both sides scored exactly ${playerScore} runs.`;
        }
    }

    function resetGame() {
        currentInnings = 1;
        playerScore = 0;
        compScore = 0;
        targetScore = null;
        isGameOver = false;

        // Reset UI elements
        pScoreEl.textContent = '0';
        cScoreEl.textContent = '0';
        targetBox.style.display = 'none';
        movesDisplay.style.display = 'none';
        commentaryEl.textContent = "Choose a number below to start match!";
        
        statusBadge.textContent = "Innings 1: You are Batting";
        statusBadge.style.backgroundColor = "#e2e8f0";
        statusBadge.style.color = var(--text);

        controlsSection.style.display = 'block';
        actionBtn.style.display = 'none';
    }
</script>

</body>
</html>
